<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="og:title" content="Clean Code Tiếng Việt" />
		<meta name="og:description" content="Clean Code Tiếng Việt: Bản dịch một số chương đầu từ quyển 'Clean Code - A Handbook of Agile Software Craftsmanship' - Robert C. Martin et. al." />
		<title></title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
		<link rel="stylesheet" href="./web/css/style.css">
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	</head>

	<body>
		<div class="pagination header" id="myHeader">
			<ul>
				<li id="btn-previ" class="next" data-btn="back"><i class="bi bi-chevron-compact-left"></i>
				</li>
				<select id="info_chapter" onchange="if(this.value) window.location.href = this.value;">
					<option value="">Chọn chương</option>
				</select>
				<li id="btn-next" class="next" data-btn="next"><i class="bi bi-chevron-compact-right"></i>
				</li>
			</ul>
		</div>

		<div class="bool-list" id="content">
			<div class="container">
				<!-- content chapter -->
				<div id="j-content" class="col-xs-12">
					<!-- full file md -->
					<div class="content mt-2" id="content-markdown">
						<div id="loading-spinner" class="text-center py-5">
							<div class="spinner-border text-secondary" role="status">
								<span class="visually-hidden">Đang tải...</span>
							</div>
							<p class="mt-2 text-muted">Đang tải nội dung...</p>
						</div>
					</div>
				</div>
			</div>z
			<div id="btn-fs">
				<button class="btn btn-outline-secondary btn-dash" onclick="dashFs5px()"><i class="bi bi-dash-square"></i></button>
				<button class="btn btn-outline-secondary btn-plus" onclick="plusFs5px()" ><i class="bi bi-plus-square"></i></button>
			</div>
		</div>
	</body>
	<script>
		var header = document.getElementById("myHeader");
		var sticky = header.offsetTop;

		function plusFs5px() {
			var txt = document.getElementById('content');
			var currentSize = parseFloat(window.getComputedStyle(txt, null).getPropertyValue('font-size'));
			var newSize = currentSize + 5 > 40 ? 40 : currentSize + 5;
			txt.style.fontSize = newSize + 'px';
			localStorage.setItem('fontSize', newSize);
		}
		function dashFs5px() {
			var txt = document.getElementById('content');
			var currentSize = parseFloat(window.getComputedStyle(txt, null).getPropertyValue('font-size'));
			var newSize = currentSize - 5 < 16 ? 16 : currentSize - 5;
			txt.style.fontSize = newSize + 'px';
			localStorage.setItem('fontSize', newSize);
		}
		// Khôi phục font size đã lưu
		(function () {
			var savedSize = localStorage.getItem('fontSize');
			if (savedSize) document.getElementById('content').style.fontSize = savedSize + 'px';
		})();
	</script>
	<script src="./web/server.js"></script>

</html>
